name: CI

# Roda em pushes e em PRs de qualquer fork. Não usa segredos, então
# funciona para qualquer colaborador externo sem acesso à infra do projeto.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Falha em vulnerabilidade high+ nas dependencias de producao (o que vai
      # pro browser/runtime). devDependencies (CLIs locais) ficam fora do gate.
      - name: Audit (production deps)
        run: npm audit --omit=dev --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Spellcheck (UI)
        run: npm run lint:spell:ui

      - name: Typecheck
        run: npm run typecheck

      - name: Dead code (knip)
        run: npm run check:dead-code

      - name: Test
        run: npm test

      - name: Build
        # Valores de placeholder: o build não acessa o Supabase (as páginas
        # são renderizadas sob demanda). Um fork usa os próprios valores.
        env:
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: placeholder-anon-key
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
        run: npm run build
