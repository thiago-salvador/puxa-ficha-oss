name: Ingestão de dados

# Ingestão em massa das fontes públicas (TSE, Câmara, Senado, Portal da
# Transparência) para o Supabase. Roda apenas por disparo manual: usa o
# SUPABASE_SERVICE_ROLE_KEY, então nunca roda em pull_request (secrets não são
# expostos a PRs de fork; workflow_dispatch executa somente o código da main).
#
# Secrets necessários (Settings → Secrets and variables → Actions):
#   SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, TRANSPARENCIA_API_KEY (opcional)

on:
  workflow_dispatch:
    inputs:
      sources:
        description: "Fontes (separadas por espaço): camara senado tse transparencia google-news"
        required: false
        default: "camara senado"

permissions:
  contents: read

concurrency:
  group: ingest-pipeline
  cancel-in-progress: false

jobs:
  ingest-rest:
    name: REST APIs (Câmara + Senado + Transparência)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >-
      contains(github.event.inputs.sources, 'camara') ||
      contains(github.event.inputs.sources, 'senado') ||
      contains(github.event.inputs.sources, 'transparencia')
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - name: Ingestão REST
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TRANSPARENCIA_API_KEY: ${{ secrets.TRANSPARENCIA_API_KEY }}
          RAW_SOURCES: ${{ github.event.inputs.sources || 'camara senado' }}
        run: |
          set -euo pipefail
          SAFE=""
          for s in $RAW_SOURCES; do
            case "$s" in
              camara|senado|tse|transparencia|google-news) SAFE="$SAFE $s" ;;
              *) echo "::error::fonte inválida: $s" ; exit 1 ;;
            esac
          done
          npx tsx scripts/ingest-all.ts $SAFE

  ingest-tse:
    name: TSE CSV
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: contains(github.event.inputs.sources, 'tse')
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: "npm"
      - name: Cache TSE downloads
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: data/tse
          key: tse-downloads-${{ runner.os }}-v1
      - run: npm ci
      - name: Ingestão TSE
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PF_KEEP_TSE_DOWNLOADS: "1"
        run: npx tsx scripts/ingest-all.ts tse

  ingest-news:
    name: Google News
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: contains(github.event.inputs.sources, 'google-news')
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - name: Google News RSS
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/ingest-all.ts google-news
