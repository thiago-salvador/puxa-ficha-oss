version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 4
    groups:
      next-react:
        patterns:
          - "next"
          - "react"
          - "react-dom"
      sentry:
        patterns:
          - "@sentry/*"
      supabase:
        patterns:
          - "@supabase/*"
      tooling:
        dependency-type: "development"
        patterns:
          - "*"
